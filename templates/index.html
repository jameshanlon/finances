<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="main.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <title>Finances</title>
  </head>
  <body>
    {% include '_navbar.html' %}
    <div class="container">
    <h1>Finances</h1>

    <h2>Summary</h2>
    <div><canvas id="all-years-chart"></canvas></div>

    <h2>Category averages over time</h2>
    <div><canvas id="categories-chart"></canvas></div>

    <h2>Years</h2>
    <ul>
      {% for year in dataset.years | reverse %}
      <li><a href="year-{{year.index}}.html">{{year.index}}</a></li>
      {% endfor %}
    </ul>

    </div>
    <script src="bundle.js"></script>

    <!-- Summary graph for all years-->
    <script>
      const summary_ctx = document.getElementById('all-years-chart');
      new Chart(summary_ctx, {
        type: 'bar',
        data: {
          labels: [{% for year in dataset.years %} '{{year.index}}', {% endfor %} ],
          datasets: [
          {% for category in categories %}
          {
            label: '{{category.name}}',
            data: [
              {% for year in dataset.years %}
              {{year.total_amount(category)}},
              {% endfor %}
            ],
            borderWidth: 1
          },
          {% endfor %}
          ]
        },
        options: {
          responsive: true,
          interaction: {
            intersect: false,
          },
          scales: {
            x: {
              stacked: true,
            },
            y: {
              stacked: true,
              ticks: {
                  callback: function(value, index, ticks) {
                      return '£' + value;
                  }
              }
            }
          },
          plugins: {
            legend: {
              position: 'right',
            },
          },
        }
      });
    </script>

    <!-- Summary graph for each category over all years-->
    <script>
      const categories_ctx = document.getElementById('categories-chart');
      new Chart(categories_ctx, {
        type: 'line',
        data: {
          labels: [{% for year in dataset.years %} '{{year.index}}', {% endfor %} ],
          datasets: [
          {% for category in categories %}
          {
            label: '{{category.name}}',
            data: [
              {% for year in dataset.years %}
              {{year.average_amount(category)}},
              {% endfor %}
            ],
            borderWidth: 1
          },
          {% endfor %}
          ]
        },
        options: {
          responsive: true,
          interaction: {
            intersect: false,
          },
          scales: {
            y: {
              ticks: {
                  callback: function(value, index, ticks) {
                      return '£' + value;
                  }
              }
            }
          },
          plugins: {
            legend: {
              position: 'right',
            },
          },
        }
      });
    </script>

  </body>
</html>
